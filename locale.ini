meta_description = Portfolio of Max Mitenkov, illustrator and concept artist with 12+ years of experience in games, books, and NFT projects.
about_intro = I'm Max Mitenkov, an illustrator and concept designer with over 12 years of professional experience. I've worked on projects for studios in Belarus, the USA, and the UAE — from NFT character design to photorealistic environments in Unreal Engine 5.
about_closing = I'm open to remote work, one-time commissions, and long-term collaboration. Feel free to reach out — let's create visual content for your book, game, animation, or advertising campaign.
about_intro_v2 = I'm Max Mitenkov, an award-winning illustrator and concept artist with 12+ years in the entertainment industry. My work spans book covers, AAA game environments, and NFT character design — created with Photoshop, ZBrush, and Unreal Engine 5. I've collaborated with studios in Dubai (Apex Digital), Los Angeles (ICVR), and Minsk (Lunas Pro). Currently open to freelance and full-time opportunities.
