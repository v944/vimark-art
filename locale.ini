meta_description = Портфолио Максима Митенкова, иллюстратора и концепт-художника с 12+ годами опыта в играх, книгах и NFT-проектах.
about_intro = Меня зовут Максим Митенков, иллюстратор и концепт-художник с более чем 12 годами профессионального опыта. Я работал над проектами для студий в Беларуси, США и ОАЭ — от дизайна NFT-персонажей до фотореалистичных окружений в Unreal Engine 5.
about_closing = Я открыт для удалённой работы, разовых заказов и долгосрочного сотрудничества. Свяжитесь со мной — давайте создадим визуальный контент для вашей книги, игры, анимации или рекламной кампании.
about_intro_v2 = Меня зовут Максим Митенков, отмеченный наградами иллюстратор и концепт-художник с 12+ годами в индустрии развлечений. Мои работы включают обложки книг, окружения для AAA-игр и дизайн NFT-персонажей — созданные в Photoshop, ZBrush и Unreal Engine 5. Я сотрудничал со студиями в Дубае (Apex Digital), Лос-Анджелесе (ICVR) и Минске (Lunas Pro). В настоящее время открыт для фриланса и полной занятости.
