about_intro = Меня зовут Максим Митенков, иллюстратор и концепт-художник с более чем 12 годами профессионального опыта. Я работал над проектами для студий в Беларуси, США и ОАЭ — от дизайна NFT-персонажей до фотореалистичных окружений в Unreal Engine 5.
about_closing = Я открыт для удалённой работы, разовых заказов и долгосрочного сотрудничества. Свяжитесь со мной — давайте создадим визуальный контент для вашей книги, игры, анимации или рекламной кампании.
