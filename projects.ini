title = Endymion
year = 2025
client = Millena Terra
description = A project for Dan Simmons’ Endymion, the third book of the Hyperion Cantos. The series follows Raul Endymion and the enigmatic girl Aenea across centuries and star systems, pursued by the Pax and the Church of the Final Atonement.

[book-illustrations-insmoot]
title = The Shadow over Innsmouth
year = 2024
client = Personal
description = A personal illustration project for H. P. Lovecraft’s The Shadow over Innsmouth. The series visualizes the slow unraveling of a cursed coastal town — from the first uneasy glance at the harbor to the final, irreversible transformation. Working in a dark, textured style, I focused on the tension between human architecture and something ancient pushing through it. Each piece was designed to function both as a standalone image and as part of a narrative sequence, guiding the reader deeper into the story’s dread.

[book-illustrations-nameless-city]
title = Nameless City
year = 2026
client = Millena Terra
description = A series of illustrations for the short story The Nameless City by H. P. Lovecraft. The work explores the descent into an ancient, pre-human settlement hidden beneath the Arabian desert — a place where geometry feels wrong and the sand preserves more than it conceals.

[book-illustrations-vegetation]
title = Vegetation
year = 2026
client = Personal
description = A series of illustrations for Ivanov’s Vegetation. The project visualizes a world where the boundary between the human and the botanical has not just blurred — it has been overgrown. The images follow the logic of rampant ecology: architecture devoured by ivy and moss, figures half-emerged from bark and pulp, and landscapes where photosynthesis has replaced thought.

[book-illustrations-winters-twins]
title = Winter's Twins
year = 2025-2026
client = James W. Murray
description = A series of illustrations for James W. Murray’s epic fantasy saga Winter's Twins: Moonstone. The work visualizes a realm where aviation and mythology intertwine — where the Six Kingdoms are linked not by roads, but by cloudships sailing currents of wind, and where the Ko'journi mystics read fate in the beads of the sky.

