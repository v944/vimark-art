<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You · Max Mitenkov</title>
<meta name="description" content="Thank you for reaching out.">
<link rel="canonical" href="https://vimark.art/thanks.html">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="vimark_logo.png">
<style>
.thanks-hero {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
.thanks-hero img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.thanks-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px;
  z-index: 2;
  text-align: center;
}
.thanks-overlay h1 {
  font-size: 3rem;
  font-weight: 400;
  color: #eee;
  margin-bottom: 16px;
  letter-spacing: 0.04em;
}
.thanks-overlay p {
  font-size: 1.1rem;
  color: #ccc;
  margin-bottom: 40px;
  line-height: 1.7;
  max-width: 500px;
}
.thanks-overlay a {
  display: inline-block;
  padding: 14px 36px;
  background: transparent;
  color: #eee;
  border: 2px solid #eee;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  transition: background 0.2s ease, color 0.2s ease;
}
.thanks-overlay a:hover {
  background: #eee;
  color: #111;
  opacity: 1;
}
@media (max-width: 800px) {
  .thanks-overlay h1 { font-size: 2rem; }
  .thanks-overlay p { font-size: 0.95rem; }
}
</style>
</head>
<body>
  <div class="thanks-hero">
    <img src="STRONG/Crush.jpg" alt="Crush" loading="eager">
    <div class="thanks-overlay">
      <h1>Thank You</h1>
      <p>Your message has been sent successfully.<br>I will get back to you as soon as possible.</p>
      <a href="index.html">Back to Portfolio</a>
    </div>
  </div>
</body>
</html>
