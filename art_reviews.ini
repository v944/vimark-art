reviewer = Darren R.
date = Mar 16, 2025
text = Maxim did a fantastic job for me on two covers for the first two books of a series I am working on. In one case he designed a full cover- the back looked as good as the front, and only the ebook cover for the other. Both turned out great – with, what I think, the perfect tone for the subject matter. And the perfect font. The details he included and the depth of field was amazing. His turnaround time was also very fast. I plan on using him again for my next book.

