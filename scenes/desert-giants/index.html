<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Giants — vimark.art</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container">
        <div id="dust-overlay"></div>
    </div>

    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-text">Loading Scene</div>
            <div class="loading-bar"><div class="loading-bar-fill"></div></div>
            <div class="loading-error" id="loading-error"></div>
        </div>
    </div>

    <div id="info-block">
        <h1>Desert Giants</h1>
        <p>Interactive WebGL scene</p>
        <p class="controls-hint">Left click — rotate &middot; Right click — pan &middot; Scroll — zoom</p>
    </div>

    <div id="controls">
        <button id="btn-reset">Reset View</button>
        <button id="btn-auto">Auto Rotate</button>
        <a href="/" id="btn-back">Back to Portfolio</a>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
